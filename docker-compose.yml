services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: helpdesk-db
    ports:
      - "5432:5432"
    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_DATABASE: helpdesk
    volumes:
      - postgres_data:/bitnami/postgresql

  api:
    build: .
    container_name: helpdesk-api
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/helpdesk
      PORT: 3000

volumes:
  postgres_data: